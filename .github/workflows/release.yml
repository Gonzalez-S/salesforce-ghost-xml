name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Which part of the version to bump (before building the VSIX)
        type: choice
        required: true
        default: minor
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Bump version
        run: npm version ${{ inputs.bump }} --no-git-tag-version
      - run: npm run verify
      - run: npm run package
      - name: Read version
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Commit, tag, push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(release): v${{ steps.ver.outputs.version }} [skip ci]"
          git tag "v${{ steps.ver.outputs.version }}"
          git push origin HEAD:main
          git push origin "refs/tags/v${{ steps.ver.outputs.version }}"
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          files: '*.vsix'
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
